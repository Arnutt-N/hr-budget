name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # Backend: PHP 8.3 unit + integration tests against MySQL 8 service
  # -------------------------------------------------------------------
  backend:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hr_budget_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, openssl, json, fileinfo, intl, zip, gd, curl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Create test schema
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS hr_budget_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h127.0.0.1 -P3306 -uroot -proot hr_budget_test < database/hr_budget_only.sql

      - name: Materialize config/database.php from env
        # config/database.php is gitignored (user-specific creds in local dev),
        # so synthesize it from env values for CI. Mirrors the shape of the
        # local dev file exactly.
        run: |
          cat > config/database.php <<'PHP'
          <?php
          return [
              'driver'   => 'mysql',
              'host'     => $_ENV['DB_HOST'] ?? 'localhost',
              'port'     => $_ENV['DB_PORT'] ?? '3306',
              'database' => $_ENV['DB_DATABASE'] ?? 'hr_budget',
              'username' => $_ENV['DB_USERNAME'] ?? 'root',
              'password' => $_ENV['DB_PASSWORD'] ?? '',
              'charset'  => 'utf8mb4',
              'collation' => 'utf8mb4_unicode_ci',
              'options'  => [
                  PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                  PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                  PDO::ATTR_EMULATE_PREPARES => false,
                  PDO::MYSQL_ATTR_INIT_COMMAND => "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"
              ]
          ];
          PHP

      - name: Run PHPUnit (Day 1 API tests)
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-secret-min-32-chars-01234567' }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hr_budget_test
          DB_NAME: hr_budget_test
          DB_USERNAME: root
          DB_USER: root
          DB_PASSWORD: root
          DB_PASS: root
        # Scope to tests/Unit/Api — the Day 1 additions. Pre-existing tests in
        # tests/Unit/ (BudgetRequest*, Models/*) require seeded fixture data
        # that is out of scope for Day 1; to be re-enabled in Day 2 once data
        # fixtures are set up.
        run: vendor/bin/phpunit tests/Unit/Api/

  # -------------------------------------------------------------------
  # Frontend: typecheck + production build
  # -------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # -------------------------------------------------------------------
  # E2E: Playwright against full backend+frontend stack
  # -------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hr_budget
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, openssl, json, fileinfo, intl, zip, gd, curl

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: NPM install (frontend)
        run: cd frontend && npm ci

      - name: NPM install (root — playwright)
        run: npm ci

      - name: Wait for MySQL + import schema
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; then
              break
            fi
            sleep 1
          done
          mysql -h127.0.0.1 -P3306 -uroot -proot hr_budget < database/hr_budget_only.sql

      - name: Materialize config/database.php from env
        run: |
          cat > config/database.php <<'PHP'
          <?php
          return [
              'driver'   => 'mysql',
              'host'     => $_ENV['DB_HOST'] ?? 'localhost',
              'port'     => $_ENV['DB_PORT'] ?? '3306',
              'database' => $_ENV['DB_DATABASE'] ?? 'hr_budget',
              'username' => $_ENV['DB_USERNAME'] ?? 'root',
              'password' => $_ENV['DB_PASSWORD'] ?? '',
              'charset'  => 'utf8mb4',
              'collation' => 'utf8mb4_unicode_ci',
              'options'  => [
                  PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                  PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                  PDO::ATTR_EMULATE_PREPARES => false,
                  PDO::MYSQL_ATTR_INIT_COMMAND => "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"
              ]
          ];
          PHP

      - name: Seed test user
        run: |
          HASH=$(php -r "echo password_hash('pass1234', PASSWORD_DEFAULT);")
          mysql -h127.0.0.1 -P3306 -uroot -proot hr_budget -e "
            INSERT INTO users (email, name, password, role, is_active)
            VALUES ('e2e@hr.local', 'E2E User', '$HASH', 'viewer', 1)
            ON DUPLICATE KEY UPDATE password='$HASH', is_active=1;
          "

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env for backend
        # public/index.php uses Dotenv::safeLoad() which reads .env into $_ENV.
        # Workflow-level `env:` only populates getenv() reliably on some PHP
        # configurations, so materialize a .env file the dotenv loader can consume.
        run: |
          cat > .env <<'ENV'
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://127.0.0.1:18080
          APP_TIMEZONE=Asia/Bangkok
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=hr_budget
          DB_USERNAME=root
          DB_PASSWORD=root
          JWT_SECRET=ci-test-secret-min-32-chars-01234567-abcdef
          JWT_TTL=3600
          CORS_ORIGINS=http://127.0.0.1:5174,http://localhost:5174
          ENV

      - name: Start PHP backend
        run: |
          php -S 127.0.0.1:18080 -t public/ public/index.php > /tmp/php.log 2>&1 &
          echo $! > /tmp/php.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start" >&2
          cat /tmp/php.log
          exit 1

      - name: Start Vue frontend (preview)
        env:
          VITE_API_URL: http://127.0.0.1:18080
        run: |
          cd frontend
          npm run build
          npx vite preview --host 127.0.0.1 --port 5174 > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5174/ >/dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start" >&2
          cat /tmp/vite.log
          exit 1

      - name: Run Playwright E2E
        env:
          BASE_URL: http://127.0.0.1:5174
          API_URL: http://127.0.0.1:18080
          E2E_USER_EMAIL: e2e@hr.local
          E2E_USER_PASSWORD: pass1234
        run: npx playwright test tests/e2e/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/php.pid ] && kill "$(cat /tmp/php.pid)" || true
          [ -f /tmp/vite.pid ] && kill "$(cat /tmp/vite.pid)" || true
